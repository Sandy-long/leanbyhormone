<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>激素减脂实验室</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      background: url("https://raw.githubusercontent.com/Sandy-long/My-picture/main/%E5%87%8F%E8%82%A5%E9%A6%96%E9%A1%B5%E5%A4%B4%E5%9B%BE.jpg") no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
    }

    header {
      margin-top: 40px;
      text-align: center;
      font-size: 1.6em;
      font-weight: bold;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 14px 24px;
      border-radius: 16px;
      white-space: nowrap;
      color: #fff;
    }

    nav {
      margin-top: 40px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropbtn {
      background-color: rgba(255, 255, 255, 0.6);
      border: none;
      padding: 10px 18px;
      font-size: 1em;
      border-radius: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      color: #222;
      backdrop-filter: blur(3px);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
    }

    .dropbtn i {
      margin-right: 8px;
      color: #666;
      font-size: 1.2em;
    }

    .dropbtn:hover {
      background-color: rgba(255, 255, 255, 0.8);
      transform: translateY(-3px);
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #fff;
      min-width: 220px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 1;
      top: 110%;
      left: 0;
      overflow: hidden;
    }

    .dropdown-content a {
      color: #333;
      padding: 12px 18px;
      text-decoration: none;
      display: block;
      font-size: 0.95em;
    }

    .dropdown-content a:hover {
      background-color: #f0f0f0;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .module-button {
      display: inline-flex;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.6);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 1em;
      color: #222;
      text-decoration: none;
      backdrop-filter: blur(3px);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
    }

    .module-button i {
      margin-right: 8px;
      color: #666;
      font-size: 1.2em;
    }

    .module-button:hover {
      transform: translateY(-3px);
      background-color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <header>
    激素减脂实验室 ｜科学减脂，从激素平衡开始
  </header>

  <nav>
    <div class="dropdown">
      <button class="dropbtn"><i class="fas fa-dna"></i> 激素减脂入门</button>
      <div class="dropdown-content">
        <a href="#">基础科普</a>
     <div class="dropdown-content sub-dropdown-content">
        <a href="#">什么是瘦素？</a>
        <a href="#">什么是胰岛素？</a>
        <a href="#">什么是皮质醇？</a>
        <a href="#">什么是GLP-1？</a>
      </div>
    </div>
        <a href="#">常见误区</a>
        <a href="#">必看前置内容</a>
      </div>
    </div>

    <a href="#" class="module-button"><i class="fas fa-utensils"></i> 饮食计划</a>
    <a href="#" class="module-button"><i class="fas fa-bed"></i> 睡眠＋情绪＋运动</a>
    <a href="#" class="module-button"><i class="fas fa-tools"></i> 免费工具</a>
    <a href="#" class="module-button"><i class="fas fa-phone"></i> 联系我</a>
  </nav>
</body>
</html>
