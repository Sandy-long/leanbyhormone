<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>激素减脂实验室</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      background: url("https://raw.githubusercontent.com/Sandy-long/My-picture/main/%E5%87%8F%E8%82%A5%E9%A6%96%E9%A1%B5%E5%A4%B4%E5%9B%BE.jpg") no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
    }

    header {
      margin-top: 40px;
      text-align: center;
      font-size: 1.6em;
      font-weight: bold;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 14px 24px;
      border-radius: 16px;
      white-space: nowrap;
      color: #fff;
    }

    nav {
      margin-top: 40px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropbtn {
      background-color: rgba(255, 255, 255, 0.6);
      border: none;
      padding: 10px 18px;
      font-size: 1em;
      border-radius: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      color: #222;
      backdrop-filter: blur(3px);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
      user-select: none;
    }

    .dropbtn i {
      margin-right: 8px;
      color: #666;
      font-size: 1.2em;
    }

    .dropbtn:hover {
      background-color: rgba(255, 255, 255, 0.8);
      transform: translateY(-3px);
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #fff;
      min-width: 220px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 1;
      top: 110%;
      left: 0;
      overflow: visible;
      color: #333;
      padding: 0;
    }

    .dropdown-content.show {
      display: block;
    }

    .dropdown-content > div {
      position: relative;
    }

    .submenu-content {
      position: absolute;
      top: 0;
      left: 100%;
      min-width: 220px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      background-color: #fff;
      display: none;
      margin: 0;
      padding: 0;
      z-index: 10;
    }

    .submenu-content.show {
      display: block;
    }

    .submenu-content a {
      display: block;
      padding: 12px 18px;
      text-decoration: none;
      color: #333;
      font-size: 0.95em;
      border-top: 1px solid #eee;
      background-color: #fff;
      transition: background-color 0.2s ease;
      white-space: nowrap;
    }

    .submenu-content a:hover {
      background-color: #f0f0f0;
    }

    .submenu-toggle {
      display: block;
      padding: 12px 18px;
      cursor: pointer;
      user-select: none;
      font-size: 0.95em;
      color: #333;
      position: relative;
      text-decoration: none;
      border-bottom: 1px solid #eee;
      background-color: #fff;
      transition: background-color 0.2s ease;
    }

    .submenu-toggle:hover {
      background-color: #f9f9f9;
    }

    .submenu-toggle::after {
      content: "▸";
      position: absolute;
      right: 18px;
      font-size: 1em;
      color: #666;
      transition: transform 0.3s ease;
    }

    .submenu-toggle.active::after {
      transform: rotate(90deg);
    }

    .dropdown-content > a {
      color: #333;
      padding: 12px 18px;
      text-decoration: none;
      display: block;
      font-size: 0.95em;
      border-bottom: 1px solid #eee;
      background-color: #fff;
      transition: background-color 0.2s ease;
    }

    .dropdown-content > a:hover {
      background-color: #f0f0f0;
    }

    .module-button {
      display: inline-flex;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.6);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 1em;
      color: #222;
      text-decoration: none;
      backdrop-filter: blur(3px);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
    }

    .module-button i {
      margin-right: 8px;
      color: #666;
      font-size: 1.2em;
    }

    .module-button:hover {
      transform: translateY(-3px);
      background-color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <header>
    激素减脂实验室 ｜科学减脂，从激素平衡开始
  </header>

  <nav>
    <div class="dropdown" id="hormone-dropdown">
      <button class="dropbtn" id="dropbtn"><i class="fas fa-dna"></i> 激素减脂入门</button>
      <div class="dropdown-content" id="dropdown-content">
        <div>
          <a href="javascript:void(0)" class="submenu-toggle" id="base-toggle">基础科普</a>
          <div class="submenu-content" id="base-submenu">
            <a href="#">什么是瘦素？</a>
            <a href="#">胰岛素高会让你更胖吗？</a>
            <a href="#">压力激素皮质醇</a>
            <a href="#">什么是GLP-1？</a>
          </div>
        </div>
        <div>
          <a href="javascript:void(0)" class="submenu-toggle" id="myth-toggle">常见误区</a>
          <div class="submenu-content" id="myth-submenu">
            <a href="#">为什么节食反而胖？</a>
            <a href="#">熬夜真的让你吃不饱？</a>
            <a href="#">有氧运动=最佳燃脂方式吗？</a>
          </div>
        </div>
        <div>
          <a href="javascript:void(0)" class="submenu-toggle" id="pre-toggle">必看前置内容</a>
          <div class="submenu-content" id="pre-submenu">
            <a href="#">减脂原理一图看懂</a>
            <a href="#">激素调节对减脂的影响</a>
            <a href="#">你该先调节激素还是先运动？</a>
          </div>
        </div>
      </div>
    </div>

    <a href="#" class="module-button"><i class="fas fa-utensils"></i> 饮食计划</a>
    <a href="#" class="module-button"><i class="fas fa-bed"></i> 睡眠＋情绪＋运动</a>
    <a href="#" class="module-button"><i class="fas fa-tools"></i> 免费工具</a>
    <a href="#" class="module-button"><i class="fas fa-phone"></i> 联系我</a>
  </nav>

  <script>
    const dropbtn = document.getElementById('dropbtn');
    const dropdownContent = document.getElementById('dropdown-content');
    const baseToggle = document.getElementById('base-toggle');
    const baseSubmenu = document.getElementById('base-submenu');
    const mythToggle = document.getElementById('myth-toggle');
    const mythSubmenu = document.getElementById('myth-submenu');
    const preToggle = document.getElementById('pre-toggle');
    const preSubmenu = document.getElementById('pre-submenu');

    dropbtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownContent.classList.toggle('show');
      [baseSubmenu, mythSubmenu, preSubmenu].forEach(sub => sub.classList.remove('show'));
      [baseToggle, mythToggle, preToggle].forEach(t => t.classList.remove('active'));
    });

    baseToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      baseSubmenu.classList.toggle('show');
      baseToggle.classList.toggle('active');
      mythSubmenu.classList.remove('show');
      mythToggle.classList.remove('active');
      preSubmenu.classList.remove('show');
      preToggle.classList.remove('active');
    });

    mythToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      mythSubmenu.classList.toggle('show');
      mythToggle.classList.toggle('active');
      baseSubmenu.classList.remove('show');
      baseToggle.classList.remove('active');
      preSubmenu.classList.remove('show');
      preToggle.classList.remove('active');
    });

    preToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      preSubmenu.classList.toggle('show');
      preToggle.classList.toggle('active');
      baseSubmenu.classList.remove('show');
      baseToggle.classList.remove('active');
      mythSubmenu.classList.remove('show');
      mythToggle.classList.remove('active');
    });

    document.addEventListener('click', () => {
      dropdownContent.classList.remove('show');
      [baseSubmenu, mythSubmenu, preSubmenu].forEach(sub => sub.classList.remove('show'));
      [baseToggle, mythToggle, preToggle].forEach(t => t.classList.remove('active'));
    });
  </script>
</body>
</html>
